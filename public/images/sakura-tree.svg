    </g>
    <!-- Flower 3 -->
    <g transform="translate(200, 170) scale(0.5)">
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(30)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(102)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(174)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(246)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(318)"/>
      <circle cx="0" cy="0" r="3" fill="#c0392b" opacity="0.35"/>
    </g>
    <!-- Flower 4 -->
    <g transform="translate(620, 50) scale(0.55)">
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(10)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(82)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(154)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(226)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(298)"/>
      <circle cx="0" cy="0" r="3" fill="#c0392b" opacity="0.35"/>
    </g>
    <!-- Flower 5 -->
    <g transform="translate(440, 450) scale(0.6)">
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(20)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(92)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(164)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(236)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(308)"/>
      <circle cx="0" cy="0" r="3" fill="#c0392b" opacity="0.3"/>
    </g>
  </g>

  <!-- Falling petals - scattered loose petals -->
  <g opacity="0.5">
    <ellipse cx="250" cy="150" rx="3" ry="5" fill="#f5cac3" transform="rotate(45, 250, 150)"/>
    <ellipse cx="450" cy="180" rx="2.5" ry="4.5" fill="#f8d7d0" transform="rotate(-30, 450, 180)"/>
    <ellipse cx="650" cy="150" rx="3" ry="5" fill="#f5cac3" transform="rotate(60, 650, 150)"/>
    <ellipse cx="180" cy="350" rx="2" ry="4" fill="#f8d7d0" transform="rotate(-45, 180, 350)"/>
    <ellipse cx="580" cy="400" rx="3" ry="5" fill="#f5cac3" transform="rotate(30, 580, 400)"/>
    <ellipse cx="700" cy="250" rx="2.5" ry="4" fill="#f8d7d0" transform="rotate(-60, 700, 250)"/>
    <ellipse cx="300" cy="550" rx="2" ry="4" fill="#f5cac3" transform="rotate(50, 300, 550)"/>
    <ellipse cx="500" cy="600" rx="3" ry="5" fill="#f8d7d0" transform="rotate(-20, 500, 600)"/>
    <ellipse cx="150" cy="650" rx="2.5" ry="4" fill="#f5cac3" transform="rotate(70, 150, 650)"/>
    <ellipse cx="680" cy="550" rx="2" ry="4" fill="#f8d7d0" transform="rotate(-40, 680, 550)"/>
    <ellipse cx="400" cy="750" rx="3" ry="5" fill="#f5cac3" transform="rotate(25, 400, 750)"/>
    <ellipse cx="220" cy="850" rx="2.5" ry="4.5" fill="#f8d7d0" transform="rotate(-55, 220, 850)"/>
    <ellipse cx="600" cy="800" rx="2" ry="4" fill="#f5cac3" transform="rotate(40, 600, 800)"/>
    <ellipse cx="100" cy="950" rx="3" ry="5" fill="#f8d7d0" transform="rotate(-15, 100, 950)"/>
    <ellipse cx="750" cy="700" rx="2.5" ry="4" fill="#f5cac3" transform="rotate(55, 750, 700)"/>
  </g>
</svg>
