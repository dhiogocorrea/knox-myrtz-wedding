    <g transform="translate(380, 60) scale(0.7)">
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(0)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(72)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(144)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(216)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f5cac3" transform="rotate(288)"/>
