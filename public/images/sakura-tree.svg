    <!-- Flower 2 -->
    <g transform="translate(500, 275) scale(0.6)">
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(15)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(87)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(159)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#f8d7d0" transform="rotate(231)"/>
